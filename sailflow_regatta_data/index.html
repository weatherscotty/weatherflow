<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Coast Yacht Club Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --navy:#0a1628;--deep:#0d1f3c;--steel:#1a3557;--chart:#f0ede6;--chart2:#e8e4da;
  --muted:#6b7a99;--red-mark:#c0392b;--green-mark:#1a7a4a;--yellow-mark:#d4a017;
  --blue-mark:#1a6fa8;--accent:#4a9eff;--white:#ffffff;
  --panel-bg:rgba(10,22,40,0.97);--border:rgba(74,158,255,0.18);--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#topbar{background:var(--deep);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:1000}
#topbar h1{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
#topbar h1 span{color:var(--accent)}
.topbar-divider{width:1px;height:28px;background:var(--border)}
.legend{display:flex;gap:10px;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:500}
.legend-svg{width:14px;height:14px;flex-shrink:0}
.topbar-spacer{flex:1}
#sync-status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
#sync-dot.ok{background:#00e676}
#sync-dot.err{background:#ff5252}
#sync-dot.busy{background:var(--yellow-mark)}
#btn-add-club{background:var(--accent);color:var(--navy);border:none;border-radius:var(--radius);padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:opacity .15s}
#btn-add-club:hover{opacity:.85}
#main{display:flex;flex:1;overflow:hidden}
#map{flex:1;z-index:1}
#side-panel{width:380px;background:var(--panel-bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#panel-inner{flex:1;overflow-y:auto;padding:20px}
#panel-inner::-webkit-scrollbar{width:4px}
#panel-inner::-webkit-scrollbar-track{background:transparent}
#panel-inner::-webkit-scrollbar-thumb{background:var(--steel);border-radius:2px}
#panel-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted);text-align:center;padding:32px}
#panel-placeholder .anchor-icon{font-size:36px;opacity:.3}
#panel-placeholder p{font-size:13px;line-height:1.6}
.club-header{margin-bottom:20px}
.club-abbrev{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.club-name-display{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;line-height:1.2;color:var(--white);margin-bottom:6px}
.type-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.03em}
.type-badge.sail{background:rgba(26,111,168,.3);color:#7ec8f5;border:1px solid rgba(26,111,168,.4)}
.type-badge.power{background:rgba(212,160,23,.25);color:#f5cc6e;border:1px solid rgba(212,160,23,.35)}
.type-badge.both{background:rgba(26,122,74,.3);color:#6dd99a;border:1px solid rgba(26,122,74,.4)}
.type-badge.racing{background:rgba(192,57,43,.3);color:#f5967e;border:1px solid rgba(192,57,43,.4)}
.info-grid{display:grid;gap:10px;margin:16px 0}
.info-row{display:flex;gap:10px}
.info-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);min-width:80px;padding-top:1px}
.info-value{font-size:13px;color:var(--chart);flex:1}
.info-value a{color:var(--accent);text-decoration:none}
.info-value a:hover{text-decoration:underline}
.section-divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.section-title button{font-size:11px;font-weight:600;color:var(--accent);background:none;border:1px solid var(--border);border-radius:5px;padding:3px 9px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.section-title button:hover{background:rgba(74,158,255,.12)}
.edit-form{display:none;margin-bottom:16px}
.edit-form.open{display:block}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:5px;color:var(--white);font-family:'Inter',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row textarea{resize:vertical;min-height:60px}
.form-row select option{background:var(--deep)}
.form-actions{display:flex;gap:8px;margin-top:12px}
.btn-save{flex:1;background:var(--accent);color:var(--navy);border:none;border-radius:5px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn-save:hover{opacity:.85}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-cancel{padding:8px 14px;background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.btn-cancel:hover{background:rgba(255,255,255,.05)}
.race-empty{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0}
.race-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.race-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.race-name{font-size:14px;font-weight:600;color:var(--white)}
.race-meta{font-size:11px;color:var(--muted);margin-top:2px}
.race-card-actions{display:flex;gap:6px}
.race-btn-edit,.race-btn-del{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:3px;transition:background .15s}
.race-btn-edit:hover{background:rgba(74,158,255,.15)}
.race-btn-del:hover{background:rgba(192,57,43,.2)}
.race-nodes{margin-top:8px}
.race-node-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.race-node-item:last-child{border-bottom:none}
.node-num{width:18px;height:18px;border-radius:50%;background:var(--steel);color:var(--accent);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.node-coords{color:#aac;font-family:monospace;font-size:10px}
.race-add-form{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:none}
.race-add-form.open{display:block}
.nodes-list{margin:10px 0;display:flex;flex-direction:column;gap:8px}
.node-row{display:flex;gap:6px;align-items:center}
.node-row span{font-size:11px;color:var(--muted);min-width:18px;text-align:right}
.node-row input{flex:1}
.btn-add-node{background:none;border:1px dashed var(--border);border-radius:5px;color:var(--muted);font-size:12px;padding:6px;cursor:pointer;width:100%;text-align:center;transition:border-color .15s,color .15s}
.btn-add-node:hover{border-color:var(--accent);color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--deep);border:1px solid var(--border);border-radius:12px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:28px}
.modal h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
#filters{display:flex;gap:6px;align-items:center}
.filter-chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:.02em}
.filter-chip.active{color:var(--navy);border-color:transparent}
.filter-chip[data-type="all"].active{background:var(--muted);color:var(--navy)}
.filter-chip[data-type="Sail + Power"].active{background:var(--green-mark)}
.filter-chip[data-type="Sail"].active{background:var(--blue-mark);color:#fff}
.filter-chip[data-type="Power"].active{background:var(--yellow-mark)}
.filter-chip[data-type="Sail Racing"].active{background:var(--red-mark);color:#fff}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--steel);color:var(--white);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:500;z-index:3000;opacity:0;transition:opacity .2s;border:1px solid var(--accent);pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#loading-screen{position:fixed;inset:0;background:var(--navy);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s}
#loading-screen.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--muted);letter-spacing:.08em}
.coords-line{font-size:11px;color:var(--muted);font-family:monospace}
.leaflet-container{background:#0a1a30}
.leaflet-control-zoom{border:1px solid var(--border)!important}
.leaflet-control-zoom a{background:var(--deep)!important;color:var(--accent)!important;border-color:var(--border)!important}
.leaflet-control-zoom a:hover{background:var(--steel)!important}
.race-map-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:600;color:var(--accent);background:none;border:1px solid var(--border);border-radius:5px;padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;transition:background .15s}
.race-map-btn:hover{background:rgba(74,158,255,.12)}
.race-map-btn.active{background:rgba(74,158,255,.2);border-color:var(--accent)}
</style>
</head>

<!-- Loading screen -->
<div id="loading-screen">
  <div class="loading-spinner"></div>

</div>

<div id="topbar">

    <button class="filter-chip" data-type="Power">Power</button>
    <button class="filter-chip" data-type="Sail Racing">Racing</button>

  <div class="legend">

    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 14 14"><circle cx="7" cy="7" r="6" fill="#1a6fa8" stroke="#fff" stroke-width="1"/></svg>Sail</div>

    <div class="legend-item"><svg class="legend-svg" viewBox="0 0 14 14"><polygon points="7,1 13,7 7,13 1,7" fill="#c0392b" stroke="#fff" stroke-width="1"/></svg>Racing</div>
  </div>
  <div class="topbar-spacer"></div>
  <div id="sync-status"><div id="sync-dot"></div><span id="sync-label">Connecting…</span></div>
  <div class="topbar-divider"></div>
  <button id="btn-add-club">+ Add Club</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="side-panel">
    <div id="panel-inner">
      <div id="panel-placeholder">
        <div class="anchor-icon">⚓</div>
        <p>Click any marker on the map to view club details, manage race courses, and edit information.</p>
      </div>
      <div id="club-detail" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- Add Club Modal -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h2>Add Yacht Club</h2>
    <div class="form-row"><label>Club Name *</label><input id="ac-name" type="text" placeholder="e.g. Puget Sound Sailing Club"></div>
    <div class="form-row"><label>Abbreviation</label><input id="ac-abbrev" type="text"></div>
    <div class="form-row"><label>State *</label>
      <select id="ac-state">
        <option value="">Select state…</option>
        <option value="Washington">Washington</option>
        <option value="Oregon">Oregon</option>
        <option value="California">California</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-row"><label>City / Area</label><input id="ac-city" type="text"></div>
    <div class="form-row"><label>Water Body</label><input id="ac-water" type="text"></div>
    <div class="form-row"><label>Club Type</label>
      <select id="ac-type">
        <option value="Sail + Power">Sail + Power</option>
        <option value="Sail">Sail</option>
        <option value="Power">Power</option>
        <option value="Sail Racing">Sail Racing</option>
      </select>
    </div>
    <div class="form-row"><label>Association(s)</label><input id="ac-assoc" type="text"></div>
    <div class="form-row"><label>Website</label><input id="ac-website" type="text"></div>
    <div class="form-row"><label>Address</label><input id="ac-address" type="text"></div>
    <div class="form-row"><label>Latitude *</label><input id="ac-lat" type="number" step="0.0001" placeholder="e.g. 47.6452"></div>
    <div class="form-row"><label>Longitude *</label><input id="ac-lng" type="number" step="0.0001" placeholder="e.g. -122.3086"></div>
    <div class="modal-actions">
      <button class="btn-save" id="btn-ac-save">Add Club</button>
      <button class="btn-cancel" id="btn-ac-cancel">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

// ── STATE ────────────────────────────────────────────────────────
let clubs = [];
let races = {};
let activeFilter = 'all';
let selectedClubId = null;
let mapMarkers = {};
let raceOverlays = {};
let activeRaceId = null;
let leafletMap;

// ── SYNC STATUS ──────────────────────────────────────────────────
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = '';
  dot.classList.add(state); // ok | err | busy
  lbl.textContent = label;
}

// ── SEED DB IF EMPTY ─────────────────────────────────────────────
async function seedIfEmpty() {
  const { count, error: ce2 } = await sb.from('clubs').select('*', {count:'exact', head:true});
  if (!ce2 && count === 0) {
    setSyncStatus('busy', 'Seeding…');
    // Insert in batches of 20
    for (let i = 0; i < SEED.length; i += 20) {
      const batch = SEED.slice(i, i+20);
      const { error } = await sb.from('clubs').insert(batch);
      if (error) { console.error('Seed error', error); }
    }
  }
}

// ── LOAD DATA ────────────────────────────────────────────────────
async function loadAll() {
  setSyncStatus('busy', 'Loading…');
  try {
    await seedIfEmpty();
    const [{ data: clubData, error: ce }, { data: raceData, error: re }] = await Promise.all([
      sb.from('clubs').select('*').order('state').order('name'),
      sb.from('races').select('*').order('created_at')
    ]);
    if (ce) throw ce;
    if (re) throw re;
    clubs = clubData || [];
    races = {};
    (raceData || []).forEach(r => { races[r.id] = r; });
    setSyncStatus('ok', `${clubs.length} clubs`);
    return true;
  } catch(e) {
    console.error(e);
    setSyncStatus('err', 'DB error');
    toast('Database error: ' + (e.message || e));
    return false;
  }
}

// ── MAP MARKERS ──────────────────────────────────────────────────
function makeIcon(type, selected) {
  const s = selected ? 22 : 16;
  const sw = selected ? 2 : 1.2;
  let shape;
  if (type === 'Sail + Power') {
    const p = selected ? '11,2 20,20 2,20' : '8,1 15,15 1,15';
    shape = `<polygon points="${p}" fill="${selected?'#34d36a':'#1a7a4a'}" stroke="${selected?'#fff':'rgba(255,255,255,0.7)'}" stroke-width="${sw}" stroke-linejoin="round"/>`;
  } else if (type === 'Sail') {
    const r = selected ? 9 : 6.5, c = s/2;
    shape = `<circle cx="${c}" cy="${c}" r="${r}" fill="${selected?'#4ab8ff':'#1a6fa8'}" stroke="${selected?'#fff':'rgba(255,255,255,0.7)'}" stroke-width="${sw}"/>`;
  } else if (type === 'Power') {
    const pad = selected ? 2 : 1.5;
    shape = `<rect x="${pad}" y="${pad}" width="${s-pad*2}" height="${s-pad*2}" rx="2" fill="${selected?'#f5cc3a':'#d4a017'}" stroke="${selected?'#fff':'rgba(255,255,255,0.7)'}" stroke-width="${sw}"/>`;
  } else {
    const h = s/2;
    shape = `<polygon points="${h},1 ${s-1},${h} ${h},${s-1} 1,${h}" fill="${selected?'#f56e5a':'#c0392b'}" stroke="${selected?'#fff':'rgba(255,255,255,0.7)'}" stroke-width="${sw}" stroke-linejoin="round"/>`;
  }
  return L.divIcon({
    className:'',
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">${shape}</svg>`,
    iconSize:[s,s], iconAnchor:[s/2,s/2], popupAnchor:[0,-s/2]
  });
}

function initMap() {
  leafletMap = L.map('map', {zoomControl:true}).setView([43,-122],6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap contributors © CARTO', maxZoom:19
  }).addTo(leafletMap);
}

function renderMarkers() {
  Object.values(mapMarkers).forEach(m => leafletMap.removeLayer(m));
  mapMarkers = {};
  clubs.forEach(club => {
    if (!club.lat || !club.lng) return;
    if (activeFilter !== 'all' && club.type !== activeFilter) return;
    const sel = club.id === selectedClubId;
    const marker = L.marker([club.lat, club.lng], {icon:makeIcon(club.type, sel), zIndexOffset:sel?1000:0}).addTo(leafletMap);
    marker.on('click', () => openClub(club.id));
    mapMarkers[club.id] = marker;
  });
}

function refreshMarkerIcon(id) {
  const m = mapMarkers[id]; if (!m) return;
  const club = clubs.find(c => c.id === id); if (!club) return;
  m.setIcon(makeIcon(club.type, id === selectedClubId));
  m.setZIndexOffset(id === selectedClubId ? 1000 : 0);
}

// ── RACE OVERLAYS ────────────────────────────────────────────────
function clearRaceOverlay(raceId) {
  if (!raceOverlays[raceId]) return;
  raceOverlays[raceId].lines.forEach(l => leafletMap.removeLayer(l));
  raceOverlays[raceId].markers.forEach(m => leafletMap.removeLayer(m));
  delete raceOverlays[raceId];
}

function drawRaceCourse(race) {
  // Support both snake_case (DB) and camelCase
  const nodes = (race.nodes || []).filter(n => n.lat && n.lng && !isNaN(parseFloat(n.lat)) && !isNaN(parseFloat(n.lng)));
  if (nodes.length < 2) { toast('Add at least 2 nodes with coordinates to draw the course'); return; }
  clearRaceOverlay(race.id);
  const layers = {lines:[], markers:[]};
  const color = '#4a9eff';
  for (let i = 0; i < nodes.length - 1; i++) {
    const a = [parseFloat(nodes[i].lat), parseFloat(nodes[i].lng)];
    const b = [parseFloat(nodes[i+1].lat), parseFloat(nodes[i+1].lng)];
    layers.lines.push(L.polyline([a,b], {color, weight:2.5, opacity:0.85}).addTo(leafletMap));
    const mid = [(a[0]+b[0])/2, (a[1]+b[1])/2];
    const dLat = b[0]-a[0], dLng = (b[1]-a[1])*Math.cos(a[0]*Math.PI/180);
    const angle = Math.atan2(dLng, dLat)*180/Math.PI;
    const arrowSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="transform:rotate(${angle}deg)"><polygon points="8,0 14,14 8,10 2,14" fill="${color}" opacity="0.9"/></svg>`;
    layers.markers.push(L.marker(mid, {icon:L.divIcon({className:'',html:arrowSvg,iconSize:[16,16],iconAnchor:[8,8]}), interactive:false}).addTo(leafletMap));
  }
  nodes.forEach((n,i) => {
    const isS = i===0, isF = i===nodes.length-1;
    const col = isS?'#00e676':isF?'#ff5252':'#ffd740';
    const lbl = isS?'S':isF?'F':String(i+1);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="9" fill="${col}" stroke="#fff" stroke-width="1.5"/><text x="11" y="15" text-anchor="middle" font-size="10" font-weight="700" font-family="Inter,sans-serif" fill="#000">${lbl}</text></svg>`;
    const bm = L.marker([parseFloat(n.lat),parseFloat(n.lng)], {icon:L.divIcon({className:'',html:svg,iconSize:[22,22],iconAnchor:[11,11]})}).addTo(leafletMap);
    bm.bindTooltip(`${i+1}. ${n.name||'Node'}`, {direction:'top',offset:[0,-12]});
    layers.markers.push(bm);
  });
  raceOverlays[race.id] = layers;
  leafletMap.fitBounds(L.latLngBounds(nodes.map(n=>[parseFloat(n.lat),parseFloat(n.lng)])).pad(0.3));
}

function toggleRaceOverlay(raceId) {
  if (activeRaceId === raceId) {
    clearRaceOverlay(raceId); activeRaceId = null;
    document.querySelectorAll('.race-map-btn').forEach(b => b.classList.remove('active'));
  } else {
    if (activeRaceId) clearRaceOverlay(activeRaceId);
    drawRaceCourse(races[raceId]);
    activeRaceId = raceId;
    document.querySelectorAll('.race-map-btn').forEach(b => b.classList.toggle('active', b.dataset.raceid===raceId));
  }
}

// ── CLUB DETAIL ──────────────────────────────────────────────────
function typeBadgeClass(t) {
  return {['Sail + Power']:'both',Sail:'sail',Power:'power',['Sail Racing']:'racing'}[t]||'both';
}

function openClub(id) {
  if (selectedClubId && selectedClubId !== id) refreshMarkerIcon(selectedClubId);
  selectedClubId = id;
  refreshMarkerIcon(id);
  const club = clubs.find(c => c.id === id); if (!club) return;
  leafletMap.setView([club.lat, club.lng], Math.max(leafletMap.getZoom(),12), {animate:true});
  renderClubDetail(club);
  document.getElementById('panel-placeholder').style.display = 'none';
  document.getElementById('club-detail').style.display = 'block';
}

      <div class="form-row"><label>Club Name</label><input id="ef-name" value="${esc(club.name)}"></div>
      <div class="form-row"><label>Abbreviation</label><input id="ef-abbrev" value="${esc(club.abbrev||'')}"></div>
      <div class="form-row"><label>State</label><select id="ef-state">${['Washington','Oregon','California','Other'].map(s=>`<option value="${s}"${club.state===s?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="form-row"><label>City / Area</label><input id="ef-city" value="${esc(club.city||'')}"></div>
      <div class="form-row"><label>Water Body</label><input id="ef-water" value="${esc(club.water||'')}"></div>
      <div class="form-row"><label>Type</label><select id="ef-type">${['Sail + Power','Sail','Power','Sail Racing'].map(t=>`<option value="${t}"${club.type===t?' selected':''}>${t}</option>`).join('')}</select></div>
      <div class="form-row"><label>Association</label><input id="ef-assoc" value="${esc(club.association||'')}"></div>
      <div class="form-row"><label>Website</label><input id="ef-website" value="${esc(club.website||'')}"></div>
      <div class="form-row"><label>Address</label><input id="ef-address" value="${esc(club.address||'')}"></div>
      <div class="form-row"><label>Latitude</label><input id="ef-lat" type="number" step="0.00001" value="${club.lat||''}"></div>
      <div class="form-row"><label>Longitude</label><input id="ef-lng" type="number" step="0.00001" value="${club.lng||''}"></div>
      <div class="form-actions">
        <button class="btn-save" id="ef-save-btn" onclick="saveEdit()">Save Changes</button>
        <button class="btn-cancel" onclick="toggleEditForm()">Cancel</button>
      </div>
    </div>
    <hr class="section-divider">
    <div class="section-title">Race Courses <span style="color:var(--muted);font-weight:400;font-size:12px;">(${clubRaces.length})</span> <button onclick="toggleRaceForm()">+ Add Race</button></div>
    <div class="race-add-form" id="race-add-form">
      <div class="form-row"><label>Race Name *</label><input id="rf-name" placeholder="e.g. Wednesday Night Beer Can"></div>
      <div class="form-row"><label>Date(s)</label><input id="rf-dates" placeholder="e.g. Every Wed May–Sep"></div>
      <div class="form-row"><label>Notes</label><textarea id="rf-notes" rows="2" placeholder="Course description, handicap class, etc."></textarea></div>
      <div class="form-row">
        <label>Race Nodes (buoys in order)</label>
        <div class="nodes-list" id="nodes-list">
          <div class="node-row"><span>1</span><input type="text" placeholder="Name/label" style="flex:2"><input type="number" step="0.00001" placeholder="Lat" style="flex:1.5"><input type="number" step="0.00001" placeholder="Lng" style="flex:1.5"></div>
        </div>
        <button class="btn-add-node" type="button" onclick="addNodeRow()">+ Add node</button>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="rf-save-btn" type="button" onclick="saveRace()">Save Race</button>
        <button class="btn-cancel" type="button" onclick="toggleRaceForm()">Cancel</button>
      </div>
    </div>
    <div id="races-list">${clubRaces.map(r=>renderRaceCard(r)).join('') || '<div class="race-empty">No races added yet.</div>'}</div>`;
}

function renderRaceCard(r) {
  const nodes = r.nodes || [];
  const nc = nodes.filter(n=>n.lat&&n.lng).length;
  const nodesHtml = nodes.length
    ? `<div class="race-nodes">${nodes.map((n,i)=>`<div class="race-node-item"><div class="node-num">${i+1}</div><span style="flex:1;color:var(--chart)">${esc(n.name||'Unnamed')}</span>${n.lat&&n.lng?`<span class="node-coords">${parseFloat(n.lat).toFixed(4)}, ${parseFloat(n.lng).toFixed(4)}</span>`:''}</div>`).join('')}</div>` : '';
  return `<div class="race-card" id="rcard-${r.id}">
    <div class="race-card-header">
      <div>
        <div class="race-name">${esc(r.name)}</div>
        <div class="race-meta">${r.dates?esc(r.dates):'No dates set'} · ${nodes.length} node${nodes.length!==1?'s':''}</div>
        ${r.notes?`<div class="race-meta" style="margin-top:4px;color:var(--chart2)">${esc(r.notes)}</div>`:''}
      </div>
      <div class="race-card-actions">
        <button class="race-btn-edit" onclick="openEditRace('${r.id}')" title="Edit">✏</button>
        <button class="race-btn-del" onclick="deleteRace('${r.id}')" title="Delete">🗑</button>
      </div>
    </div>
    ${nodesHtml}
    ${nc>=2?`<button class="race-map-btn" data-raceid="${r.id}" onclick="toggleRaceOverlay('${r.id}')">🗺 Show on map</button>`:''}
  </div>`;
}

// ── EDIT CLUB ────────────────────────────────────────────────────
function toggleEditForm() { document.getElementById('edit-form').classList.toggle('open'); }

async function saveEdit() {
  const club = clubs.find(c => c.id === selectedClubId); if (!club) return;
  const btn = document.getElementById('ef-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const updates = {
    name:        document.getElementById('ef-name').value.trim(),
    abbrev:      document.getElementById('ef-abbrev').value.trim(),
    state:       document.getElementById('ef-state').value,
    city:        document.getElementById('ef-city').value.trim(),
    water:       document.getElementById('ef-water').value.trim(),
    type:        document.getElementById('ef-type').value,
    association: document.getElementById('ef-assoc').value.trim(),
    website:     document.getElementById('ef-website').value.trim(),
    address:     document.getElementById('ef-address').value.trim(),
    lat:         parseFloat(document.getElementById('ef-lat').value),
    lng:         parseFloat(document.getElementById('ef-lng').value),
  };
  const { error } = await sb.from('clubs').update(updates).eq('id', club.id);
  if (error) { toast('Save failed: ' + error.message); btn.disabled=false; btn.textContent='Save Changes'; return; }
  Object.assign(club, updates);
  renderMarkers();
  renderClubDetail(club);
  toast('Club info saved ✓');
}

// ── RACE MANAGEMENT ──────────────────────────────────────────────
function toggleRaceForm() {
  const f = document.getElementById('race-add-form');
  const open = f.classList.toggle('open');
  if (open) {
    document.getElementById('rf-name').value = '';
    document.getElementById('rf-dates').value = '';
    document.getElementById('rf-notes').value = '';
    document.getElementById('nodes-list').innerHTML = '<div class="node-row"><span>1</span><input type="text" placeholder="Name/label" style="flex:2"><input type="number" step="0.00001" placeholder="Lat" style="flex:1.5"><input type="number" step="0.00001" placeholder="Lng" style="flex:1.5"></div>';
    document.getElementById('rf-save-btn').onclick = saveRace;
    document.getElementById('rf-name').focus();
  }
}

function addNodeRow() {
  const list = document.getElementById('nodes-list');
  const num = list.children.length + 1;
  const row = document.createElement('div');
  row.className = 'node-row';
  row.innerHTML = `<span>${num}</span><input type="text" placeholder="Name/label" style="flex:2"><input type="number" step="0.00001" placeholder="Lat" style="flex:1.5"><input type="number" step="0.00001" placeholder="Lng" style="flex:1.5">`;
  list.appendChild(row);
}

function collectNodes() {
  return Array.from(document.querySelectorAll('#nodes-list .node-row')).map(row => {
    const ins = row.querySelectorAll('input');
    return {name:ins[0].value.trim(), lat:ins[1].value.trim(), lng:ins[2].value.trim()};
  }).filter(n => n.name || n.lat || n.lng);
}

function genId() { return 'id_' + Date.now() + '_' + Math.floor(Math.random()*1e6); }

async function saveRace() {
  const name = document.getElementById('rf-name').value.trim();
  if (!name) { toast('Race name is required'); return; }
  const btn = document.getElementById('rf-save-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const race = {
    id: genId(),
    club_id: selectedClubId,
    name,
    dates: document.getElementById('rf-dates').value.trim(),
    notes: document.getElementById('rf-notes').value.trim(),
    nodes: collectNodes()
  };
  const { error } = await sb.from('races').insert(race);
  if (error) { toast('Save failed: ' + error.message); btn.disabled=false; btn.textContent='Save Race'; return; }
  races[race.id] = race;
  renderClubDetail(clubs.find(c => c.id === selectedClubId));
  toast('Race course saved ✓');
}

async function deleteRace(raceId) {
  if (!confirm('Delete this race course?')) return;
  const { error } = await sb.from('races').delete().eq('id', raceId);
  if (error) { toast('Delete failed: ' + error.message); return; }
  clearRaceOverlay(raceId);
  if (activeRaceId === raceId) activeRaceId = null;
  delete races[raceId];
  renderClubDetail(clubs.find(c => c.id === selectedClubId));
  toast('Race deleted');
}

async function openEditRace(raceId) {
  const r = races[raceId]; if (!r) return;
  const f = document.getElementById('race-add-form');
  f.classList.add('open');
  document.getElementById('rf-name').value = r.name;
  document.getElementById('rf-dates').value = r.dates || '';
  document.getElementById('rf-notes').value = r.notes || '';
  const list = document.getElementById('nodes-list');
  list.innerHTML = '';
  const ns = r.nodes && r.nodes.length ? r.nodes : [{name:'',lat:'',lng:''}];
  ns.forEach((n,i) => {
    const row = document.createElement('div');
    row.className = 'node-row';
    row.innerHTML = `<span>${i+1}</span><input type="text" placeholder="Name/label" style="flex:2" value="${esc(n.name||'')}"><input type="number" step="0.00001" placeholder="Lat" style="flex:1.5" value="${n.lat||''}"><input type="number" step="0.00001" placeholder="Lng" style="flex:1.5" value="${n.lng||''}">`;
    list.appendChild(row);
  });
  document.getElementById('rf-save-btn').onclick = async () => {
    const btn = document.getElementById('rf-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    const updates = {
      name:  document.getElementById('rf-name').value.trim(),
      dates: document.getElementById('rf-dates').value.trim(),
      notes: document.getElementById('rf-notes').value.trim(),
      nodes: collectNodes()
    };
    const { error } = await sb.from('races').update(updates).eq('id', raceId);
    if (error) { toast('Save failed: ' + error.message); btn.disabled=false; btn.textContent='Save Race'; return; }
    Object.assign(races[raceId], updates);
    if (activeRaceId === raceId) { clearRaceOverlay(raceId); drawRaceCourse(races[raceId]); }
    renderClubDetail(clubs.find(c => c.id === selectedClubId));
    toast('Race updated ✓');
  };
}

// ── ADD CLUB MODAL ───────────────────────────────────────────────
document.getElementById('btn-add-club').addEventListener('click', () => {
  document.getElementById('modal-add').classList.add('open');
});
document.getElementById('btn-ac-cancel').addEventListener('click', () => {
  document.getElementById('modal-add').classList.remove('open');
});
document.getElementById('modal-add').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-add'))
    document.getElementById('modal-add').classList.remove('open');
});
document.getElementById('btn-ac-save').addEventListener('click', async () => {
  const name  = (document.getElementById('ac-name').value || '').trim();
  const state = document.getElementById('ac-state').value;
  const lat   = parseFloat(document.getElementById('ac-lat').value);
  const lng   = parseFloat(document.getElementById('ac-lng').value);
  if (!name || !state) { toast('Name and State are required'); return; }
  if (isNaN(lat) || isNaN(lng)) { toast('Valid coordinates are required'); return; }
  const btn = document.getElementById('btn-ac-save');
  btn.disabled = true; btn.textContent = 'Saving…';
  const newClub = {
    id: genId(), name, state, lat, lng,
    abbrev:      (document.getElementById('ac-abbrev').value||'').trim(),
    city:        (document.getElementById('ac-city').value||'').trim(),
    water:       (document.getElementById('ac-water').value||'').trim(),
    type:        document.getElementById('ac-type').value,
    association: (document.getElementById('ac-assoc').value||'').trim(),
    website:     (document.getElementById('ac-website').value||'').trim(),
    address:     (document.getElementById('ac-address').value||'').trim(),
  };
  const { error } = await sb.from('clubs').insert(newClub);
  btn.disabled = false; btn.textContent = 'Add Club';
  if (error) { toast('Save failed: ' + error.message); return; }
  clubs.push(newClub);
  setSyncStatus('ok', `${clubs.length} clubs`);
  renderMarkers();
  document.getElementById('modal-add').classList.remove('open');
  ['ac-name','ac-abbrev','ac-city','ac-water','ac-assoc','ac-website','ac-address','ac-lat','ac-lng'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('ac-state').value = '';
  toast('Club added ✓');
  openClub(newClub.id);
});

// ── FILTERS ──────────────────────────────────────────────────────
document.querySelectorAll('.filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.type;
    renderMarkers();
    if (selectedClubId) setTimeout(() => refreshMarkerIcon(selectedClubId), 40);
  });
});

// ── UTILS ────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2800);
}

// ── BOOT ─────────────────────────────────────────────────────────
(async () => {
  try {
    initMap();
    const ok = await loadAll();
    if (ok) renderMarkers();
  } catch(e) {
    console.error('Boot error:', e);
    setSyncStatus('err', 'Load failed');
    document.getElementById('loading-screen').innerHTML =
      '<div style="color:#ff5252;font-family:monospace;font-size:13px;padding:40px;text-align:center;line-height:2">&#10060; Failed to load: ' + e.message + '<br><button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#4a9eff;color:#0a1628;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">Reload</button></div>';
    return;
  }
  // Hide loading screen
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hidden');
  setTimeout(() => ls.style.display='none', 500);
})();
</script>
</body>
</html>
